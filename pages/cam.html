<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCam Solutions</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    
    <section class="tela celular">
        <header class="topo">
            <div>
                <h2>CodeCam Solutions</h2>
                <p>Transformando estudos com IA</p>
            </div>
        </header>

        <nav class="abas">
            <button class="aba ativa">Perguntas</button>
            <button class="aba">Câmera</button>
        </nav>

        <div class="camera-area">
            <img src="../assets/foto-exemplo.png" alt="Foto do exercício">
        </div>

        <div class="camera-footer">
            <button class="btn-mini">◻</button>
            <button class="btn-captura" id="btn-captura"></button>
            <button class="btn-mini">↻</button>
        </div>

    </section>

    <script src="../script/script.js"></script>
</body>
</html>
