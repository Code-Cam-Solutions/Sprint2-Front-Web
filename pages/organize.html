<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCam Solutions</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <section class="tela celular">
            <header class="topo">
                <button class="voltar" id="btn-voltar">←</button>
                <div>
                    <h2>CodeCam Solutions</h2>
                    <p>Transformando estudos com IA</p>
                </div>
            </header>

            <nav class="abas">
                <button class="aba ativa">Perguntas</button>
                <button class="aba">Câmera</button>
            </nav>

            <section class="categorias">
                <input type="text" placeholder="Pesquisar categoria">

                <div class="lista-categorias">
                    <button>Biologia</button>
                    <button>Fotossíntese</button>
                    <button>Desenvolvimento</button>
                    <button>Matemática</button>
                </div>
            </section>

            <section class="favoritos">
                <h3>Mais acessados</h3>

                <div class="cards-favoritos">
                    <article class="favorito-card">
                        <h4>Mapa Mental</h4>
                        <p>Resumo rápido</p>
                    </article>

                    <article class="favorito-card">
                        <h4>IA Explica</h4>
                        <p>Conteúdo simplificado</p>
                    </article>

                    <article class="favorito-card">
                        <h4>Flash Cards</h4>
                        <p>Revisão dinâmica</p>
                    </article>
                </div>
            </section>
        </section>

        <script src="../script/script.js"></script>
</body>
</html>
