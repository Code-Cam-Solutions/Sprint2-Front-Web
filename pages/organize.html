<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCam Solutions</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <section class="tela celular">
            <header class="topo">
                <button class="voltar" id="btn-voltar"> <img src="../assets/back.svg" alt=""></button>
                <div>
                    <h2>CodeCam Solutions</h2>
                    <p>Transformando estudos com IA</p>
                </div>
            </header>

            <nav class="abas">
                <button class="aba" id="btn-transcricao">Transcrição</button>
                <button class="aba ativa">Organizar</button>
            </nav>

            <section class="categorias">
                <p>Adicione em alguma matéria:</p>
                <input type="text" placeholder="Pesquisar">
                

                <div class="lista-categorias">
                    <button class="categoria">Biologia</button>
                    <button class="categoria">História</button>
                    <button class="categoria">Geografia</button>
                    <button class="categoria">Matemática</button>
                </div>
            </section>

            <section class="favoritos">
                <h3>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    viewBox="0 0 24 24" fill="#8b5cf6" style="vertical-align:middle; margin-right:6px;">
                        <path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5Z"/>
                    </svg>
                    Crie:
                </h3>

            <div class="cards-favoritos">
                <button class="favorito-card" id="resumo-card">
                    <div class="favorito-icone resumo-icone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                    </div>
                    <h4>Gerar resumo</h4>
                </button>

    <button class="favorito-card" id="btn-topicos">
        <div class="favorito-icone topicos-icone">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 6h16M4 10h16M4 14h10"/>
            </svg>
        </div>
        <h4>Criar tópicos</h4>
    </button>

    <button class="favorito-card" id="btn-flashcards">
        <div class="favorito-icone flashcards-icone">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 7h18M3 12h18M3 17h18"/>
            </svg>
        </div>
        <h4>Criar flashcards</h4>
    </button>
</div>
            </section>
        </section>

        <script src="../script/script.js"></script>
</body>
</html>
