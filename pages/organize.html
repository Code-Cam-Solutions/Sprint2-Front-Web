<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCam Solutions</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <section class="tela celular">
            <header class="topo">
                <button class="voltar" id="btn-voltar"> <img src="../assets/back.svg" alt=""></button>
                <div>
                    <h2>CodeCam Solutions</h2>
                    <p>Transformando estudos com IA</p>
                </div>
            </header>

            <nav class="abas">
                <button class="aba" id="btn-camera">Câmera</button>
                <button class="aba ativa">Organizar</button>
            </nav>

            <section class="categorias">
                <p>Inclua em uma categoria:</p>
                <input type="text" placeholder="Pesquisar">
                

                <div class="lista-categorias">
                    <button class="categoria">Biologia</button>
                    <button class="categoria">Fotossíntese</button>
                    <button class="categoria">Desenvolvimento</button>
                    <button class="categoria">Matemática</button>
                </div>
            </section>

            <section class="favoritos">
                <h3>Ações inteligentes</h3>

                <div class="cards-favoritos">
                    <article class="favorito-card">
                        <h4>Gerar Resumo</h4>
                        <p>Resumo rápido</p>
                    </article>

                    <article class="favorito-card">
                        <h4>IA Explica</h4>
                        <p>Conteúdo simplificado</p>
                    </article>

                    <article class="favorito-card">
                        <h4>Criar Flash Cards</h4>
                        <p>Revisão dinâmica</p>
                    </article>
                </div>
            </section>
        </section>

        <script src="../script/script.js"></script>
</body>
</html>
