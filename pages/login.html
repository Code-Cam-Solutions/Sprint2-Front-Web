<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · CodeCam Solutions</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <section class="tela celular">
        <header class="topo">
            <div>
                <h2>CodeCam Solutions</h2>
                <p>Entre para continuar</p>
            </div>
        </header>

        <section class="login-content">
            <div class="login-card">
                <h3>Faça seu login</h3>
                <p>Use seu email e senha para acessar a câmera.</p>
                <form id="login-form">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required>

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required>

                    <button type="submit" class="btn-entrar">Entrar</button>
                </form>
            </div>
        </section>

        <footer class="login-footer">
            <p>Não se preocupe, seus dados não serão salvos neste protótipo.</p>
        </footer>
    </section>

    <script src="../script/script.js"></script>
</body>
</html>
