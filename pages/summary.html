<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerar Resumo · CodeCam Solutions</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <section class="tela celular">

    <header class="topo">
      <button class="voltar" id="btn-summary-voltar">
        <img src="../assets/back.svg" alt="Voltar">
      </button>
      <div>
        <h2>CodeCam Solutions</h2>
        <p>Transformando estudos com IA</p>
      </div>
    </header>

    <nav class="abas">
      <button class="aba ativa">Organizar</button>
      <button class="aba" id="btn-camera">Câmera</button>
    </nav>

    <div class="flash-header">
      <span class="flash-icone">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             fill="none" viewBox="0 0 24 24" stroke="#8b5cf6" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 6h16M4 10h16M4 14h16"/>
        </svg>
      </span>
      <h3 class="flash-titulo">Gerar resumo</h3>
    </div>

    <div class="flash-input-area">
      <input
        type="text"
        id="summary-input"
        class="flash-input"
        placeholder="Digite o assunto desejado"
      >
      <button class="flash-send" id="summary-send">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M14 5l7 7m0 0l-7 7m7-7H3"/>
        </svg>
      </button>
    </div>

    <div class="topicos-conteudo" id="summary-conteudo"></div>

    <div class="flash-rodape" id="summary-rodape" style="display:none;">
      <button class="btn-rodape-icone" title="Opções">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5 12h.01M12 12h.01M19 12h.01"/>
        </svg>
      </button>
    </div>

  </section>

  <script src="../script/script.js"></script>
</body>
</html>
