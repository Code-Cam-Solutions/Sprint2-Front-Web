<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Tópicos · CodeCam Solutions</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <section class="tela celular">

        <header class="topo">
            <button class="voltar" id="btn-voltar-topicos">
                <img src="../assets/back.svg" alt="Voltar">
            </button>
            <div>
                <h2>CodeCam Solutions</h2>
                <p>Transformando estudos com IA</p>
            </div>
        </header>

        <nav class="abas">
            <button class="aba ativa">Organizar</button>
            <button class="aba" id="btn-camera-topicos">Câmera</button>
        </nav>

<div class="flash-header">
    <span class="flash-icone">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             fill="none" viewBox="0 0 24 24" stroke="#8b5cf6" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M4 6h16M4 10h16M4 14h10"/>
        </svg>
    </span>
    <h3 class="flash-titulo">Criar tópicos</h3>
</div>

        <div class="flash-input-area">
            <input
                type="text"
                id="topicos-input"
                class="flash-input"
                placeholder="Digite qual conteúdo deseja no seu resumo..."
            >
            <button class="flash-send" id="topicos-send">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </button>
        </div>

        <div class="topicos-conteudo" id="topicos-conteudo"></div>

        <div class="flash-rodape" id="topicos-rodape" style="display:none;">
            <button class="btn-rodape-roxo" id="btn-salvar-topicos" title="Salvar"> <img src="../assets/save.svg" alt=""> </button>
        </div>

        <div class="overlay-materias" id="overlay-materias"></div>
        <div class="caixa-materias" id="caixa-materias">
            <h3>Salvar em qual matéria?</h3>
            <div class="lista-materias">
                <button class="btn-materia" data-materia="História">História</button>
                <button class="btn-materia" data-materia="Matemática">Matemática</button>
                <button class="btn-materia" data-materia="Biologia">Biologia</button>
            </div>
        </div>

        <div class="popup-sucesso" id="popup-sucesso">
            <p>Tópicos adicionados com sucesso!</p>
        </div>

    </section>

    <script src="../script/script.js"></script>
</body>
</html>
